telegram:
  bot_token: "token"
  admin_ids: [1,2,3,4]
  bot_username: "your_bot_username"
  # Mode: "polling" (default) or "webhook"
  # mode: "polling"
  # webhook:
  #   url: "https://your.domain/tg"     # Public HTTPS URL Telegram POSTs to
  #   path: "/tg"                       # Local URL path the aiohttp server listens on
  #   host: "0.0.0.0"
  #   port: 8081
  #   secret_token: "optional-random-string"
  #   drop_pending_updates: true

postgres:
  host: "localhost"
  port: 5432
  user: "tma_user"
  password: "tma_password"
  db: "tma_db"
  # pool_size: 30
  # pool_timeout: 30
  # pool_recycle: 3600
  # max_overflow: 20
  # pool_pre_ping: true
  # echo_pool: false

auth:
  secret_key: "secret"
  algorithm: "HS256"
  access_token_expire_minutes: 30

log:
  level: "INFO"

