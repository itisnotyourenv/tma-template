name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  MYPY_PATHS: "src/"
  LINT_PATHS: "src/ tests/"

# ── Validate ──────────────────────────────────────────────────────────────

jobs:
  check-required-files:
    name: Validate Required Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          missing=0
          for f in .pre-commit-config.yaml pyproject.toml uv.lock; do
            if [ ! -f "$f" ]; then
              echo " - $f"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "❌ Missing required files (listed above)"
            exit 1
          fi

          echo "✅ All required configuration files are present"

  check-dependencies:
    name: Validate Lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Verify lockfile is up-to-date
        run: uv lock --check

  lint-and-format:
    name: Lint & Format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Ruff lint
        run: uv run ruff check $LINT_PATHS --output-format=github

      - name: Ruff format check
        run: uv run ruff format $LINT_PATHS --check

# ── Test ──────────────────────────────────────────────────────────────────

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: cifra_db
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_INITDB_ARGS: "--auth-host=trust"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --group tests

      - name: Run tests with coverage
        env:
          CI_POSTGRES_HOST: localhost
          CI_POSTGRES_PORT: "5432"
        run: |
          uv run pytest tests/ \
            -v --tb=short \
            -n auto --dist worksteal \
            --junitxml=pytest-junit.xml \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            pytest-junit.xml
            coverage.xml

# ── Security ──────────────────────────────────────────────────────────────

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Ruff security rules
        run: uv run ruff check $LINT_PATHS --select=S --output-format=github || true

      - name: Check for potential secrets
        run: |
          echo "🔍 Checking for potential secrets (tracked YAML/JSON only)..."
          set +e
          git grep -nEi "password|secret|key|token" -- '*.yaml' '*.yml' '*.json' \
            | grep -v -Ei '(example|template)' \
            | grep -v '.github/workflows/'
          GREP_EXIT=$?
          set -e

          if [ "$GREP_EXIT" -eq 0 ]; then
            echo "⚠️  Potential secrets found (review output above)"
            exit 1
          else
            echo "✅ No obvious secrets found"
          fi

# ── Type Check ────────────────────────────────────────────────────────────

  type-check:
    name: Type Check (MyPy)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run MyPy
        run: uv run mypy $MYPY_PATHS --ignore-missing-imports --no-strict-optional

